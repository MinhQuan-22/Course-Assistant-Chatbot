version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: course_assistant_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_assistant_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql

  chromadb:
    image: chromadb/chroma:latest
    container_name: course_assistant_chromadb
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  mysql_data:
  chroma_data: